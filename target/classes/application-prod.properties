# ============================================================
# Production profile — activate with: --spring.profiles.active=prod
# or set SPRING_PROFILES_ACTIVE=prod as an environment variable
# ============================================================

# --- DataSource (MySQL) ---
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:quantitymeasurementdb}?useSSL=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'validate' is safe for production — never auto-create/drop
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Connection pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# --- H2 console disabled in production ---
spring.h2.console.enabled=false

# --- Swagger disabled in production ---
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# --- Actuator: expose only health endpoint publicly ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# --- Logging ---
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
