spring.application.name=quantity-measurement-app

spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: schema created on startup, dropped on shutdown (suitable for dev/test)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable the legacy schema.sql from UC16 — JPA manages DDL directly
spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow H2 console to load in iframe (Spring Security blocks it by default)
spring.h2.console.settings.web-allow-others=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG


server.port=8082